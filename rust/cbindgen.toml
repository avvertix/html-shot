language = "C"
header = """/* takumi_php - Auto-generated C header
 * Do not edit manually. Generated by cbindgen.
 */"""
include_guard = "TAKUMI_PHP_H"
autogen_warning = "/* Warning: this file is auto-generated by cbindgen. Do not modify. */"

parse = { parse_deps = false }

[export]
include = []
exclude = []
prefix = ""

[struct]
# Non-repr(C) structs are treated as opaque by cbindgen

[enum]
rename_variants = "None"

[fn]
rename_args = "None"
